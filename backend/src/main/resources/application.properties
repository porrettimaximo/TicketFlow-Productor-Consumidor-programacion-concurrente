# =============================================
# TicketFlow - Configuración del servidor
# =============================================

# Puerto del servidor
server.port=8080

# Nombre de la aplicación
spring.application.name=ticketflow

# Logging
logging.level.com.medsim=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# CORS (permitir llamadas desde el frontend React)
# Configurado en WebConfig.java

# =============================================
# Parámetros de la simulación (editables)
# =============================================
# Capacidad total del evento (tickets disponibles)
simulation.exam.capacity=10

# Tamaño máximo del buffer (cola de solicitudes pendientes)
simulation.buffer.size=5

# Cantidad de clientes a simular en cada ejecución
simulation.students.count=20

# Tiempo mínimo de procesamiento de una solicitud (ms)
simulation.processing.min-time=500

# Tiempo máximo de procesamiento de una solicitud (ms)
simulation.processing.max-time=2000
